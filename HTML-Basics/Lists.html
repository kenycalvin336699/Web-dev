<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Lists</h1>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Kiwi</li>
    </ul>

    <ol>
        <li>Gym</li>
        <li>Bath</li>
        <li>Collage</li>
    </ol>

    <dl>
        <dt>Madara</dt>
        <dd>Ghost of the Uchiha</dd>
        <dt>Itachi</dt>
        <dd>The clane killer</dd>
        <dt>Sasuke</dt>
        <dd>The last uchiha</dd>
    </dl>
</body>
</html>
