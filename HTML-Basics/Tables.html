<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Table</h1>
    <table border="1">
        <tr>
            <th>no</th>
            <th>Item</th>
            <th>Price</th>
            <th>W</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Crush</td>
            <td>12 rs</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Advance</td>
            <td>30 rs</td>
        </tr>
        <tr>
            <td>3</td>
            <td rowspan="2">Connecter</td>
            <td colspan="2">25 rs</td>
        </tr>
        <tr>
            <td>4</td>
        </tr>
    </table>
</body>
</html>
